name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # -------------------------------------------------------------------
  # 1. Unit tests + typecheck + validate artifacts/skills (gridgram-style)
  # -------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned to match release.yml for reproducibility. Bump only
          # after verifying a fresh release cut on every target platform.
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate AI artifacts
        run: bun run ai:regen

      - name: Validate plugin skills
        run: bun run validate-plugin-skills

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun test

  # -------------------------------------------------------------------
  # 2. Cross-compile binaries for smoke tests (linux amd64 runner)
  # -------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: linux-amd64
            ext: ""
          - target: bun-linux-arm64
            artifact: linux-arm64
            ext: ""
          - target: bun-darwin-arm64
            artifact: darwin-arm64
            ext: ""
          - target: bun-windows-x64
            artifact: windows-amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - run: bun install --frozen-lockfile

      - name: Cross-compile
        run: |
          bun build src/index.ts --compile \
            --target=${{ matrix.target }} \
            --outfile=chartjs2img${{ matrix.ext }}

      - uses: actions/upload-artifact@v6
        with:
          name: bin-${{ matrix.artifact }}
          path: chartjs2img${{ matrix.ext }}

  # -------------------------------------------------------------------
  # 3. Smoke test on linux-amd64 (bun dev mode — baseline)
  # -------------------------------------------------------------------
  test-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - run: bun install --frozen-lockfile

      - name: Generate examples
        run: bun run src/index.ts examples -o ./test-output

      - name: Verify outputs
        run: |
          # Floor check only — the examples gallery grows over time.
          # CI stays green as long as every rendered file is a
          # non-empty PNG.
          MIN=18
          COUNT=$(ls test-output/*.png 2>/dev/null | wc -l)
          echo "PNG files: $COUNT (min expected: $MIN)"
          if [ "$COUNT" -lt "$MIN" ]; then
            echo "::error::Expected at least $MIN PNG files, got $COUNT"
            exit 1
          fi

          FAILED=0
          for f in test-output/*.png; do
            SIZE=$(stat --format=%s "$f")
            INFO=$(file "$f")
            if ! echo "$INFO" | grep -q "PNG image data"; then
              echo "::error::$f is not a valid PNG"
              FAILED=1
            elif [ "$SIZE" -lt 1000 ]; then
              echo "::error::$f is too small (${SIZE} bytes)"
              FAILED=1
            else
              echo "OK: $f (${SIZE} bytes)"
            fi
          done

          exit $FAILED

  # -------------------------------------------------------------------
  # 4. Smoke test compiled binary on macOS ARM64
  # -------------------------------------------------------------------
  test-darwin-arm64:
    needs: build
    runs-on: macos-14  # Apple Silicon (M1)
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: bin-darwin-arm64

      - name: Make executable
        run: chmod +x ./chartjs2img

      - name: Hide system Chrome to test auto-install
        run: |
          if [ -d "/Applications/Google Chrome.app" ]; then
            sudo mv "/Applications/Google Chrome.app" "/Applications/Google Chrome.app.bak"
            echo "RESTORE_CHROME=1" >> $GITHUB_ENV
          fi
          if [ -d "/Applications/Chromium.app" ]; then
            sudo mv "/Applications/Chromium.app" "/Applications/Chromium.app.bak"
            echo "RESTORE_CHROMIUM=1" >> $GITHUB_ENV
          fi

      - name: Verify help
        run: ./chartjs2img --help

      - name: Verify llm docs
        run: |
          LINES=$(./chartjs2img llm | wc -l)
          echo "LLM doc lines: $LINES"
          [ "$LINES" -gt 1000 ]

      - name: Generate examples (triggers auto-install of Chrome for Testing)
        run: ./chartjs2img examples -o ./test-output

      - name: Restore system Chrome
        if: always()
        run: |
          [ "$RESTORE_CHROME" = "1" ] && sudo mv "/Applications/Google Chrome.app.bak" "/Applications/Google Chrome.app" || true
          [ "$RESTORE_CHROMIUM" = "1" ] && sudo mv "/Applications/Chromium.app.bak" "/Applications/Chromium.app" || true

      - name: Verify outputs
        run: |
          # Floor check only — the examples gallery grows over time.
          # CI stays green as long as every rendered file is a
          # non-empty PNG.
          MIN=18
          COUNT=$(ls test-output/*.png 2>/dev/null | wc -l)
          echo "PNG files: $COUNT (min expected: $MIN)"
          if [ "$COUNT" -lt "$MIN" ]; then
            echo "::error::Expected at least $MIN PNG files, got $COUNT"
            exit 1
          fi

          FAILED=0
          for f in test-output/*.png; do
            SIZE=$(stat -f%z "$f")
            INFO=$(file "$f")
            if ! echo "$INFO" | grep -q "PNG image data"; then
              echo "::error::$f is not a valid PNG"
              FAILED=1
            elif [ "$SIZE" -lt 1000 ]; then
              echo "::error::$f is too small (${SIZE} bytes)"
              FAILED=1
            else
              echo "OK: $f (${SIZE} bytes)"
            fi
          done

          exit $FAILED

  # -------------------------------------------------------------------
  # 5. Smoke test compiled binary on Windows
  # -------------------------------------------------------------------
  test-windows:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: bin-windows-amd64

      - name: Hide system Chrome to test auto-install
        shell: pwsh
        run: |
          $chromePath = "C:\Program Files\Google\Chrome"
          if (Test-Path $chromePath) {
            Rename-Item $chromePath "$chromePath.bak"
            Write-Host "Renamed system Chrome"
          }

      - name: Verify help
        shell: pwsh
        run: .\chartjs2img.exe --help

      - name: Verify llm docs
        shell: pwsh
        run: |
          $lines = (.\chartjs2img.exe llm | Measure-Object -Line).Lines
          Write-Host "LLM doc lines: $lines"
          if ($lines -lt 1000) { exit 1 }

      - name: Generate examples (triggers auto-install of Chrome for Testing)
        shell: pwsh
        run: .\chartjs2img.exe examples -o test-output

      - name: Verify outputs
        shell: pwsh
        run: |
          # Floor check only — see the linux job for rationale.
          $min = 18
          $files = Get-ChildItem test-output\*.png
          $count = $files.Count
          Write-Host "PNG files: $count (min expected: $min)"
          if ($count -lt $min) {
            Write-Error "Expected at least $min PNG files, got $count"
            exit 1
          }

          $failed = 0
          foreach ($f in $files) {
            if ($f.Length -lt 1000) {
              Write-Error "$($f.Name) is too small ($($f.Length) bytes)"
              $failed = 1
            } else {
              Write-Host "OK: $($f.Name) ($($f.Length) bytes)"
            }
          }

          exit $failed

      - name: Restore system Chrome
        if: always()
        shell: pwsh
        run: |
          $chromePath = "C:\Program Files\Google\Chrome"
          if (Test-Path "$chromePath.bak") {
            Rename-Item "$chromePath.bak" $chromePath
          }

  # -------------------------------------------------------------------
  # 6. Smoke test compiled binary on Linux ARM64 (native runner)
  # -------------------------------------------------------------------
  test-linux-arm64:
    needs: build
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: bin-linux-arm64

      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            chromium-browser fonts-noto-cjk file \
            || sudo apt-get install -y --no-install-recommends \
            chromium fonts-noto-cjk file

      - name: Make executable
        run: chmod +x ./chartjs2img

      - name: Verify help
        run: ./chartjs2img --help

      - name: Verify llm docs
        run: |
          LINES=$(./chartjs2img llm | wc -l)
          echo "LLM doc lines: $LINES"
          [ "$LINES" -gt 1000 ]

      - name: Generate examples
        run: ./chartjs2img examples -o ./test-output

      - name: Verify outputs
        run: |
          # Floor check only — the examples gallery grows over time.
          # CI stays green as long as every rendered file is a
          # non-empty PNG.
          MIN=18
          COUNT=$(ls test-output/*.png 2>/dev/null | wc -l)
          echo "PNG files: $COUNT (min expected: $MIN)"
          if [ "$COUNT" -lt "$MIN" ]; then
            echo "::error::Expected at least $MIN PNG files, got $COUNT"
            exit 1
          fi

          FAILED=0
          for f in test-output/*.png; do
            SIZE=$(stat --format=%s "$f")
            INFO=$(file "$f")
            if ! echo "$INFO" | grep -q "PNG image data"; then
              echo "::error::$f is not a valid PNG"
              FAILED=1
            elif [ "$SIZE" -lt 1000 ]; then
              echo "::error::$f is too small (${SIZE} bytes)"
              FAILED=1
            else
              echo "OK: $f (${SIZE} bytes)"
            fi
          done

          exit $FAILED
