name: docs

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - run: bun install --frozen-lockfile

      - name: Install gridgram `gg` (for docs:diagrams)
        env:
          GG_VERSION: '0.4.1'
        run: |
          set -euo pipefail
          ASSET="gridgram_${GG_VERSION}_linux_amd64.tar.gz"
          URL="https://github.com/ideamans/gridgram/releases/download/v${GG_VERSION}/${ASSET}"
          TMP=$(mktemp -d)
          curl -fsSL -o "$TMP/$ASSET" "$URL"
          tar -xzf "$TMP/$ASSET" -C "$TMP"
          sudo mv "$TMP/gridgram_${GG_VERSION}_linux_amd64/gg" /usr/local/bin/gg
          chmod +x /usr/local/bin/gg
          gg --version

      - name: Type check
        run: bun run typecheck

      - name: Validate plugin skills
        run: bun run validate-plugin-skills

      - name: Build LLM text bundles
        run: bun run build-llms-txt

      # docs:build invokes build-llms-txt internally. Running it
      # standalone above surfaces LLM-doc problems with a smaller blast
      # radius if something goes wrong.
      - name: Build VitePress site
        run: bun run docs:build

      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: docs-dist
          path: docs/.vitepress/dist
          retention-days: 14
